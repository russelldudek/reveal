name: Candidate campaign build
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - 'scripts/build_artifacts.py'
permissions:
  contents: write
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: sudo apt-get update && sudo apt-get install -y fonts-lato libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 shared-mime-info
      - run: python -m pip install --upgrade pip && pip install weasyprint==68.0 pillow
      - run: python scripts/build_artifacts.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/brand docs
          git diff --cached --quiet || git commit -m "Refresh campaign assets and PDFs"
          git push
